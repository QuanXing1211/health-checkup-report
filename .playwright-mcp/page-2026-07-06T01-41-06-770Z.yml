        - heading "4.1.3 高危及以上安全事件" [level=4] [ref=e641]
        - paragraph [ref=e642]: 高危安全事件是指攻击者获取系统的控制权后，安装恶意软件（如后门程序），潜伏于目标系统中并对其进行长期控制，导致关键业务系统被破坏，甚至造成服务中断。典型的高危事件类型有恶意文件（勒索病毒、钓鱼附件等）、黑客工具（后门工具、代理工具、渗透工具等）、漏洞攻击（系统漏洞攻击、中间件漏洞攻击等）、内网爆破（RDP爆破、SMB爆破、数据库爆破等）、网站攻击（WebShell上传成功、代码注入成功、反序列化攻击成功等）。
        - paragraph [ref=e643]: 以下为高危及以上安全事件，详情见《安全事件清单.xlsx》，也可访问 XDR 平台-->威胁分析-->安全事件处理。
